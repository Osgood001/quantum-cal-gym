<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 160">
  <defs>
    <radialGradient id="qglow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="vec" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#e879f9"/>
    </linearGradient>
    <linearGradient id="sig" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="env" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0.05"/>
    </linearGradient>
    <clipPath id="sph">
      <circle cx="75" cy="80" r="45"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="480" height="160" rx="16" fill="#0f172a"/>

  <!-- Bloch sphere soft glow -->
  <circle cx="75" cy="80" r="58" fill="url(#qglow)"/>

  <!-- Sphere body -->
  <circle cx="75" cy="80" r="45" fill="#0f172a" stroke="#7c3aed" stroke-width="1.5" opacity="0.85"/>

  <!-- Equatorial ellipse (dashed) -->
  <ellipse cx="75" cy="80" rx="45" ry="13" fill="none"
           stroke="#7c3aed" stroke-width="1" stroke-dasharray="4,3"
           opacity="0.55" clip-path="url(#sph)"/>

  <!-- z-axis -->
  <line x1="75" y1="35" x2="75" y2="125"
        stroke="#475569" stroke-width="1" stroke-dasharray="3,3" opacity="0.55"/>

  <!-- Pole labels -->
  <text x="75" y="29" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="9" fill="#94a3b8" text-anchor="middle">|0⟩</text>
  <text x="75" y="139" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="9" fill="#94a3b8" text-anchor="middle">|1⟩</text>

  <!-- Equatorial x-axis -->
  <line x1="75" y1="80" x2="119" y2="80"
        stroke="#475569" stroke-width="1" stroke-dasharray="2,3" opacity="0.4"/>
  <text x="123" y="83" font-family="'Segoe UI',Arial,sans-serif"
        font-size="8" fill="#6b7280">|+⟩</text>

  <!-- State vector -->
  <line x1="75" y1="80" x2="104" y2="49" stroke="url(#vec)" stroke-width="2.5"/>
  <polygon points="104,49 97,58 109,57" fill="#e879f9"/>

  <!-- IQ dots — |0⟩ cluster (near north pole) -->
  <circle cx="75" cy="36" r="2"   fill="#22d3ee" opacity="0.9"/>
  <circle cx="79" cy="33" r="1.5" fill="#22d3ee" opacity="0.7"/>
  <circle cx="71" cy="39" r="1.5" fill="#22d3ee" opacity="0.6"/>
  <circle cx="78" cy="40" r="1"   fill="#22d3ee" opacity="0.5"/>

  <!-- IQ dots — |1⟩ cluster (near south pole) -->
  <circle cx="75" cy="124" r="2"   fill="#f0abfc" opacity="0.8"/>
  <circle cx="79" cy="127" r="1.5" fill="#f0abfc" opacity="0.6"/>
  <circle cx="71" cy="122" r="1.5" fill="#f0abfc" opacity="0.5"/>

  <!-- ── Rabi decay curve ── -->
  <!-- Decay envelopes -->
  <path d="M 138,52 Q 165,57 207,68"
        fill="none" stroke="url(#env)" stroke-width="1.2" stroke-dasharray="4,3"/>
  <path d="M 138,108 Q 165,103 207,92"
        fill="none" stroke="url(#env)" stroke-width="1.2" stroke-dasharray="4,3"/>

  <!-- Decaying sine (cubic bezier approximation) -->
  <path d="
    M 138,80
    C 141,52 148,52 151,80
    C 154,108 161,108 164,80
    C 167,60 174,60 177,80
    C 180,100 187,100 190,80
    C 193,66 200,66 203,80
    C 206,91 210,91 213,80
  " fill="none" stroke="url(#sig)" stroke-width="2.2"/>

  <!-- Zero-crossing sample dots -->
  <circle cx="138" cy="80" r="2.5" fill="#22d3ee" opacity="0.85"/>
  <circle cx="151" cy="80" r="2"   fill="#22d3ee" opacity="0.70"/>
  <circle cx="164" cy="80" r="2"   fill="#22d3ee" opacity="0.55"/>
  <circle cx="177" cy="80" r="1.8" fill="#22d3ee" opacity="0.42"/>
  <circle cx="190" cy="80" r="1.5" fill="#22d3ee" opacity="0.30"/>

  <!-- ── Text ── -->
  <text x="232" y="72"
        font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="48" font-weight="700" fill="#f8fafc" letter-spacing="-1">
    QC<tspan fill="#38bdf8"> Gym</tspan>
  </text>

  <text x="232" y="100"
        font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="14" fill="#94a3b8">
    Gymnasium environment for qubit calibration
  </text>

  <!-- Badge pills -->
  <rect x="232" y="113" width="72" height="20" rx="10" fill="#1e3a5f"/>
  <text x="268" y="127" font-family="monospace" font-size="10"
        fill="#38bdf8" text-anchor="middle">OpenAI Gym</text>

  <rect x="312" y="113" width="54" height="20" rx="10" fill="#2d1b69"/>
  <text x="339" y="127" font-family="monospace" font-size="10"
        fill="#c084fc" text-anchor="middle">Transmon</text>

  <rect x="374" y="113" width="46" height="20" rx="10" fill="#1e3a5f"/>
  <text x="397" y="127" font-family="monospace" font-size="10"
        fill="#38bdf8" text-anchor="middle">NumPy</text>
</svg>
